<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaflet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  const map = L.map('map').setView([34.02, -6.84], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20
  }).addTo(map);

  let geoLayer = null;

  // Style simple par type_construction
  function styleFeature(feature) {
    const t = (feature.properties?.type_construction || '').toLowerCase();
    let color = '#2F3C7E';
    if (t.includes('commercial')) color = '#00BFA6';
    if (t.includes('resident')) color = '#FF6B6B';
    return { color, weight: 2, fillOpacity: 0.25 };
  }

  // Appelé par Flutter : setData([...features])
  function setData(featureCollection) {
    try {
      if (geoLayer) map.removeLayer(geoLayer);

      geoLayer = L.geoJSON(featureCollection, {
        style: styleFeature,
        onEachFeature: (feature, layer) => {
          layer.on('click', () => {
            const id = feature.properties?.id;
            if (window.MapChannel && id) {
              window.MapChannel.postMessage(JSON.stringify({ type: 'tap', id }));
            }
          });
        }
      }).addTo(map);

      map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });
    } catch (e) {
      console.log('setData error', e);
    }
  }

  // Appelé par Flutter : focusOn(id)
  function focusOn(id) {
    if (!geoLayer) return;
    geoLayer.eachLayer(layer => {
      const fid = layer.feature?.properties?.id;
      if (fid === id) {
        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
      }
    });
  }
</script>
</body>
</html>
