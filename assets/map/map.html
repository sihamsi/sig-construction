<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaflet SIG</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
  />
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    /* 🔥 cacher toute UI leaflet-draw */
    .leaflet-draw-toolbar,
    .leaflet-draw-actions {
      display: none !important;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  // ================= GLOBALS =================
  let map;
  let geoLayer = null;
  let drawnItems;
  let drawHandler = null;
  let editingLayer = null;
  let selectedLayer = null;

  // ================= MAP INIT =================
  map = L.map('map').setView([34.02, -6.84], 16);

  // 🌍 ESRI World Street Map
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
    {
      maxZoom: 20,
      attribution: '© Esri'
    }
  ).addTo(map);

  drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);

  // ================= STYLE =================
  function styleFeature(feature) {
    const t = (feature.properties?.type_construction || '').toLowerCase();
    let color = '#7B1E3A'; // bordeaux résidentiel
    if (t.includes('commercial')) color = '#C62828';

    return {
      color: color,
      weight: 2,
      fillOpacity: 0.35
    };
  }

  // ================= SELECTION =================
  function clearSelection() {
    if (selectedLayer && geoLayer) {
      geoLayer.resetStyle(selectedLayer);
      selectedLayer = null;
    }
  }

  // ================= SET DATA (Flutter → Map) =================
  function setData(featureCollection) {
    clearSelection();

    if (geoLayer) {
      map.removeLayer(geoLayer);
    }

    geoLayer = L.geoJSON(featureCollection, {
      style: styleFeature,
      onEachFeature: (feature, layer) => {

        layer.on('click', () => {
          clearSelection();
          selectedLayer = layer;

          layer.setStyle({
            color: '#FFD54F',
            weight: 3,
            fillOpacity: 0.55
          });

          const id = feature.properties?.id;
          if (window.MapChannel && id) {
            window.MapChannel.postMessage(JSON.stringify({
              type: 'tap',
              id: id
            }));
          }
        });

      }
    }).addTo(map);

    if (geoLayer.getLayers().length > 0) {
      map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });
    }
  }

  // ================= FOCUS (Liste → Carte) =================
  function focusOn(id) {
    if (!geoLayer) return;

    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        clearSelection();
        selectedLayer = layer;

        layer.setStyle({
          color: '#FFD54F',
          weight: 3,
          fillOpacity: 0.55
        });

        map.fitBounds(layer.getBounds(), { padding: [40, 40] });
      }
    });
  }

  // ================= CAS 1 : AJOUT =================
  function startDraw() {
    clearSelection();

    if (drawHandler) {
      drawHandler.disable();
      drawHandler = null;
    }

    drawHandler = new L.Draw.Polygon(map, {
      allowIntersection: false,
      showArea: true,
      shapeOptions: {
        color: '#2E7D32'
      }
    });

    drawHandler.enable();
  }

  map.on(L.Draw.Event.CREATED, function (e) {
    const layer = e.layer;
    drawnItems.addLayer(layer);

    const feature = layer.toGeoJSON();

    if (window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({
        type: 'created',
        feature: feature
      }));
    }

    if (drawHandler) {
      drawHandler.disable();
      drawHandler = null;
    }
  });

  // ================= CAS 2 : MODIFIER FORME =================
  function enableEdit(id) {
    if (!geoLayer) return;

    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        editingLayer = layer;
        layer.editing.enable();
      }
    });
  }

  function saveEdit(id) {
    if (!editingLayer) return;

    editingLayer.editing.disable();
    const feature = editingLayer.toGeoJSON();

    if (window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({
        type: 'edited',
        id: id,
        feature: feature
      }));
    }

    editingLayer = null;
    clearSelection();
  }

  // ================= DELETE =================
  function deletePolygon(id) {
    if (!geoLayer) return;

    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        geoLayer.removeLayer(layer);
      }
    });

    clearSelection();
  }
</script>
</body>
</html>
