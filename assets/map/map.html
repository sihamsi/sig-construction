<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaflet SIG</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .leaflet-draw-toolbar,
    .leaflet-draw-actions {
      display: none !important;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  // ================= MAP =================
  let map = L.map('map').setView([34.02, -6.84], 16);

  // ================= BASE MAP (Satellite uniquement) =================
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 20, attribution: '© Esri' }
  ).addTo(map);

  // ================= GEOJSON / SELECTION =================
  let geojsonLayer = null;
  let idToLayer = {};
  let selectedLayer = null;

  // (garde tes variables draw/edit existantes)
  let editingLayer = null;
  let drawHandler = null;

  // 1) STYLE basé sur type_color envoyé par Flutter
  function featureStyle(feature) {
    const p = (feature && feature.properties) ? feature.properties : {};
    const c = p.type_color || '#546E7A'; // couleur venant de Flutter
    return {
      color: c,
      fillColor: c,
      weight: 2,
      fillOpacity: 0.45
    };
  }

  function selectedStyle(feature) {
    const base = featureStyle(feature);
    base.weight = 4;
    base.fillOpacity = 0.65;
    return base;
  }

  // 2) Gestion sélection/désélection + notify Flutter
  function clearSelection(notify = true) {
    if (selectedLayer) {
      selectedLayer.setStyle(featureStyle(selectedLayer.feature));
    }
    selectedLayer = null;

    if (notify && window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({ type: 'untap' }));
    }
  }

  function selectLayer(layer, notify = true) {
    if (!layer) return;

    // toggle : si je reclique sur le même => désélection
    if (selectedLayer === layer) {
      clearSelection(notify);
      return;
    }

    // reset ancien
    if (selectedLayer) {
      selectedLayer.setStyle(featureStyle(selectedLayer.feature));
    }

    selectedLayer = layer;
    layer.setStyle(selectedStyle(layer.feature));
    layer.bringToFront();

    const id = layer.feature?.properties?.id;
    if (notify && id && window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({ type: 'tap', id: String(id) }));
    }
  }

  function onEachFeature(feature, layer) {
    const id = feature?.properties?.id;
    if (id) idToLayer[String(id)] = layer;

    layer.on('click', function(e) {
      if (e && e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent);
      selectLayer(layer, true);
    });
  }

  // clic sur la carte vide => deselect
  map.on('click', function() {
    clearSelection(true);
  });

  // 3) setData(...) avec style + onEachFeature
  function setData(featureCollection) {
    if (geojsonLayer) {
      map.removeLayer(geojsonLayer);
    }

    idToLayer = {};
    selectedLayer = null;

    geojsonLayer = L.geoJSON(featureCollection, {
      style: featureStyle,
      onEachFeature: onEachFeature
    }).addTo(map);

    if (geojsonLayer.getLayers().length > 0) {
      map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
    }
  }

  // 4) focusOn(id) => sélection sans renvoyer "tap"
  function focusOn(id) {
    const layer = idToLayer[String(id)];
    if (!layer) return;
    map.fitBounds(layer.getBounds(), { padding: [30, 30] });
    selectLayer(layer, false); // false = ne pas renvoyer "tap"
  }

  // ================= DRAW =================
  function startDraw() {
    clearSelection(true);
    if (drawHandler) drawHandler.disable();

    drawHandler = new L.Draw.Polygon(map, {
      shapeOptions: { color: '#2E7D32' }
    });
    drawHandler.enable();
  }

  map.on(L.Draw.Event.CREATED, e => {
    const feature = e.layer.toGeoJSON();
    if (window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({
        type: 'created',
        feature
      }));
    }
    drawHandler.disable();
  });

  // ================= EDIT / DELETE =================
  function enableEdit(id) {
    if (!geojsonLayer) return;

    const layer = idToLayer[String(id)];
    if (!layer) return;

    editingLayer = layer;
    layer.editing.enable();
  }

  function saveEdit(id) {
    if (!editingLayer) return;
    editingLayer.editing.disable();

    const feature = editingLayer.toGeoJSON();
    if (window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({
        type: 'edited',
        id,
        feature
      }));
    }

    editingLayer = null;
  }

  function deletePolygon(id) {
    if (!geojsonLayer) return;

    const layer = idToLayer[String(id)];
    if (!layer) return;

    geojsonLayer.removeLayer(layer);
    delete idToLayer[String(id)];

    if (selectedLayer === layer) clearSelection(true);
  }
</script>
</body>
</html>
