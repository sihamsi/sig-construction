<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leaflet SIG</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Draw -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      /* Toolbar Draw cachée: on gère via Flutter */
      .leaflet-draw-toolbar,
      .leaflet-draw-actions {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      // ================= HELPERS (DEBUG) =================
      function post(type, payload) {
        try {
          if (window.MapChannel) {
            window.MapChannel.postMessage(
              JSON.stringify({ type, ...(payload || {}) })
            );
          }
        } catch (_) {}
      }

      window.onerror = function (message, source, lineno, colno, error) {
        post("js_error", {
          message: String(message),
          source: String(source || ""),
          line: lineno,
          col: colno,
        });
      };

      function safe(fn) {
        try {
          return fn();
        } catch (e) {
          post("js_error", { message: String(e) });
        }
      }

      // ================= MAP =================
      let map = L.map("map").setView([34.02, -6.84], 16);

      L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 20, attribution: "© Esri" }
      ).addTo(map);

      // ================= LAYERS =================
      const editableGroup = new L.FeatureGroup();
      map.addLayer(editableGroup);

      let idToLayer = {};
      let selectedLayer = null;

      // DRAW
      let drawHandler = null;

      // EDIT (Leaflet.Draw officiel)
      let editToolbar = null;
      let editingId = null;

      function isEditing() {
        return !!editToolbar;
      }

      function setMapInteractionsEnabled(enabled) {
        // IMPORTANT Android: sinon conflit drag vs sommets
        const fn = enabled ? "enable" : "disable";
        map.dragging[fn]();
        map.touchZoom[fn]();
        map.doubleClickZoom[fn]();
        map.scrollWheelZoom[fn]();
        map.boxZoom[fn]();
        map.keyboard[fn]();
        if (map.tap) map.tap[fn]();
      }

      // ================= STYLE =================
      function featureStyle(feature) {
        const p = feature && feature.properties ? feature.properties : {};
        const c = p.type_color || "#546E7A";
        return { color: c, fillColor: c, weight: 2, fillOpacity: 0.45 };
      }

      function selectedStyle(feature) {
        const base = featureStyle(feature);
        base.weight = 4;
        base.fillOpacity = 0.65;
        return base;
      }

      // ================= SELECTION =================
      function clearSelection(notify = true) {
        if (selectedLayer) {
          selectedLayer.setStyle(featureStyle(selectedLayer.feature));
        }
        selectedLayer = null;

        if (notify) post("untap");
      }

      function selectLayer(layer, notify = true) {
        if (!layer) return;

        if (selectedLayer === layer) {
          clearSelection(notify);
          return;
        }

        if (selectedLayer) {
          selectedLayer.setStyle(featureStyle(selectedLayer.feature));
        }

        selectedLayer = layer;
        layer.setStyle(selectedStyle(layer.feature));
        layer.bringToFront();

        const id = layer.feature?.properties?.id;
        if (notify && id) post("tap", { id: String(id) });
      }

      // clic sur carte vide => deselect (⛔️ pas pendant édition)
      map.on("click", function () {
        if (isEditing()) return;
        clearSelection(true);
      });

      // ================= DATA =================
      function setData(featureCollection) {
        safe(() => {
          cancelDraw(false);
          stopEdit(false);

          editableGroup.clearLayers();
          idToLayer = {};
          selectedLayer = null;

          const layer = L.geoJSON(featureCollection, {
            style: featureStyle,
            onEachFeature: function (feature, lyr) {
              const id = feature?.properties?.id;
              if (id) idToLayer[String(id)] = lyr;

              lyr.on("click", function (e) {
                if (e && e.originalEvent)
                  L.DomEvent.stopPropagation(e.originalEvent);
                if (isEditing()) return;
                selectLayer(lyr, true);
              });
            },
          });

          layer.eachLayer((l) => editableGroup.addLayer(l));

          if (editableGroup.getLayers().length > 0) {
            map.fitBounds(editableGroup.getBounds(), { padding: [20, 20] });
          }
        });
      }

      function focusOn(id) {
        const layer = idToLayer[String(id)];
        if (!layer) return;
        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
        selectLayer(layer, false);
      }

      // ================= DRAW =================
      function startDraw() {
        safe(() => {
          clearSelection(true);
          stopEdit(true);

          if (drawHandler) {
            drawHandler.disable();
            drawHandler = null;
          }

          drawHandler = new L.Draw.Polygon(map, {
            shapeOptions: { color: "#2E7D32" },
            allowIntersection: false,
            showArea: true,
          });

          drawHandler.enable();
          post("draw_start");
        });
      }

      function cancelDraw(notify = true) {
        if (drawHandler) {
          drawHandler.disable();
          drawHandler = null;
        }
        if (notify) post("draw_cancel");
      }

      map.on(L.Draw.Event.CREATED, (e) => {
        safe(() => {
          const feature = e.layer.toGeoJSON();

          post("created", { feature });
          post("draw_end");

          if (drawHandler) {
            drawHandler.disable();
            drawHandler = null;
          }
        });
      });

      // ================= EDIT SHAPE (OFFICIEL) =================
      function enableEdit(id) {
        safe(() => {
          cancelDraw(false);
          stopEdit(false);

          const layer = idToLayer[String(id)];
          if (!layer) {
            post("js_error", {
              message: "Layer introuvable pour id=" + String(id),
            });
            return;
          }

          editingId = String(id);

          // ✅ handler officiel Leaflet.Draw (pas de _toolbars)
          editToolbar = new L.EditToolbar.Edit(map, {
            featureGroup: editableGroup,
            selectedPathOptions: {
              maintainColor: true,
              opacity: 0.9,
              fillOpacity: 0.6,
            },
          });

          // Android: éviter conflit gestures map vs sommets
          setMapInteractionsEnabled(false);

          editToolbar.enable();
          layer.bringToFront();

          post("edit_start", { id: editingId });
        });
      }

      function saveEdit(id) {
        safe(() => {
          const realId = String(id || editingId || "");
          if (!realId) return;

          if (!editToolbar) return;

          editToolbar.disable();
          setMapInteractionsEnabled(true);

          const layer = idToLayer[realId];
          if (!layer) {
            stopEdit(false);
            return;
          }

          const feature = layer.toGeoJSON();
          feature.properties = feature.properties || {};

          // conserver propriétés
          if (layer.feature && layer.feature.properties) {
            feature.properties = Object.assign(
              {},
              layer.feature.properties,
              feature.properties
            );
          }
          feature.properties.id = realId;

          post("edited", { id: realId, feature });
          post("edit_end");

          editToolbar = null;
          editingId = null;
        });
      }

      function stopEdit(notify = true) {
        if (editToolbar) {
          editToolbar.disable();
        }
        editToolbar = null;
        editingId = null;
        setMapInteractionsEnabled(true);

        if (notify) post("edit_end");
      }

      // ================= DELETE =================
      function deletePolygon(id) {
        safe(() => {
          const layer = idToLayer[String(id)];
          if (!layer) return;

          if (editToolbar) stopEdit(false);

          editableGroup.removeLayer(layer);
          delete idToLayer[String(id)];

          if (selectedLayer === layer) clearSelection(true);
        });
      }
    </script>
  </body>
</html>
