<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaflet SIG</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .leaflet-draw-toolbar,
    .leaflet-draw-actions {
      display: none !important;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  // ================= MAP =================
  let map = L.map('map').setView([34.02, -6.84], 16);

  // ================= BASE MAP (Satellite uniquement) =================
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 20, attribution: '© Esri' }
  ).addTo(map);

  // ================= GEOJSON =================
  let geoLayer = null;
  let selectedLayer = null;
  let editingLayer = null;
  let drawHandler = null;

  function styleFeature(feature) {
    const t = (feature.properties?.type_construction || '').toLowerCase();
    let color = '#7A1E2D';
    if (t.includes('commercial')) color = '#C62828';

    return { color, weight: 2, fillOpacity: 0.35 };
  }

  function clearSelection() {
    if (selectedLayer && geoLayer) {
      geoLayer.resetStyle(selectedLayer);
      selectedLayer = null;
    }
  }

  function setData(featureCollection) {
    clearSelection();
    if (geoLayer) map.removeLayer(geoLayer);

    geoLayer = L.geoJSON(featureCollection, {
      style: styleFeature,
      onEachFeature: (feature, layer) => {
        layer.on('click', () => {
          clearSelection();
          selectedLayer = layer;

          layer.setStyle({
            color: '#FFD54F',
            weight: 3,
            fillOpacity: 0.5
          });

          const id = feature.properties?.id;
          if (window.MapChannel && id) {
            window.MapChannel.postMessage(JSON.stringify({ type: 'tap', id }));
          }
        });
      }
    }).addTo(map);

    if (geoLayer.getLayers().length > 0) {
      map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });
    }
  }

  function focusOn(id) {
    if (!geoLayer) return;

    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        clearSelection();
        selectedLayer = layer;
        layer.setStyle({ color: '#FFD54F', weight: 3 });
        map.fitBounds(layer.getBounds(), { padding: [40, 40] });
      }
    });
  }

  // ================= DRAW =================
  function startDraw() {
    clearSelection();
    if (drawHandler) drawHandler.disable();

    drawHandler = new L.Draw.Polygon(map, {
      shapeOptions: { color: '#2E7D32' }
    });
    drawHandler.enable();
  }

  map.on(L.Draw.Event.CREATED, e => {
    const feature = e.layer.toGeoJSON();
    if (window.MapChannel) {
      window.MapChannel.postMessage(JSON.stringify({
        type: 'created',
        feature
      }));
    }
    drawHandler.disable();
  });

  function enableEdit(id) {
    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        editingLayer = layer;
        layer.editing.enable();
      }
    });
  }

  function saveEdit(id) {
    if (!editingLayer) return;
    editingLayer.editing.disable();

    const feature = editingLayer.toGeoJSON();
    window.MapChannel.postMessage(JSON.stringify({
      type: 'edited',
      id,
      feature
    }));

    editingLayer = null;
  }

  function deletePolygon(id) {
    geoLayer.eachLayer(layer => {
      if (layer.feature?.properties?.id === id) {
        geoLayer.removeLayer(layer);
      }
    });
    clearSelection();
  }
</script>
</body>
</html>
